name: iOS App IPA (unsigned, for sideloading)

# Produces an UNSIGNED device .ipa of the demo app, meant to be re-signed with a free
# Apple ID and installed over USB using Sideloadly / AltStore on Windows.
#
# It is unsigned on purpose: signing here would require an Apple Developer account and
# certificates. Sideloadly does the signing on your PC with your own Apple ID instead.

on:
  workflow_dispatch: {}

jobs:
  ipa:
    runs-on: macos-15   # Xcode 16 (project format 77)

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build SmartScanSDK.xcframework
        run: ./gradlew :sdk:assembleSmartScanSDKXCFramework --stacktrace

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: cd iosApp && xcodegen generate

      # Build a device (arm64) archive without any signing.
      - name: Archive for device (no signing)
        run: |
          set -o pipefail
          xcodebuild \
            -project iosApp/ScanGoDemo.xcodeproj \
            -scheme ScanGoDemo \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath build/ScanGoDemo.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            archive

      # Package the .app into an .ipa by hand (an unsigned archive can't be -exportArchive'd).
      - name: Package unsigned .ipa
        run: |
          set -e
          app="build/ScanGoDemo.xcarchive/Products/Applications/ScanGoDemo.app"
          test -d "$app" || { echo "::error::built .app not found at $app"; exit 1; }
          mkdir -p build/ipa/Payload
          cp -R "$app" build/ipa/Payload/
          (cd build/ipa && zip -r -y ScanGoDemo-unsigned.ipa Payload >/dev/null)
          ls -lh build/ipa/ScanGoDemo-unsigned.ipa

      - name: Upload .ipa
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ScanGoDemo-unsigned-ipa
          path: build/ipa/ScanGoDemo-unsigned.ipa
          if-no-files-found: error
