name: iOS XCFramework

# Compiles the Kotlin/Native iOS code and produces SmartScanSDK.xcframework.
# This runs on a macOS runner because Kotlin/Native for Apple targets can only
# be built on macOS — it is exactly the step that cannot be done on Windows.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

jobs:
  xcframework:
    runs-on: macos-14   # Apple Silicon runner (fast Kotlin/Native builds)

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compile common + iOS sources (fast failure on code errors)
        run: ./gradlew :sdk:compileKotlinIosSimulatorArm64 --stacktrace

      - name: Assemble XCFramework
        run: ./gradlew :sdk:assembleSmartScanSDKXCFramework --stacktrace

      - name: Run common unit tests
        run: ./gradlew :sdk:iosSimulatorArm64Test --stacktrace

      - name: Upload XCFramework
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SmartScanSDK-xcframework
          path: sdk/build/XCFrameworks/release/SmartScanSDK.xcframework
          if-no-files-found: error
